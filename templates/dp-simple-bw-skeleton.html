<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Template: dp-simple-bw-skeleton v1.0 | 2026-04-14 | Fill in slides via INSERT_SLIDES_HERE -->
<title>Discussion Paper — Skeleton</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #E5E5E5;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: #000;
}

.presentation { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

.slide {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 1440px; height: 810px;
  background: #FFFFFF;
  box-shadow: 0 2px 24px rgba(0,0,0,0.10);
  padding: 44px 80px 64px;
  display: none;
}
.slide.active { display: block; }

/* ===== Cover ===== */
.slide.cover { display: none; }
.slide.cover.active { display: flex; flex-direction: column; justify-content: center; padding: 80px 120px; }
.cover-subject { font-size: 18px; letter-spacing: 0.25em; color: #666; margin-bottom: 36px; }
.cover-title { font-size: 76px; font-weight: 700; line-height: 1.3; margin-bottom: 24px; letter-spacing: -0.01em; }
.cover-subtitle { font-size: 28px; font-weight: 400; color: #333; line-height: 1.6; }
.cover-meta { position: absolute; bottom: 80px; left: 120px; font-size: 16px; color: #666; letter-spacing: 0.08em; }
.cover-line { position: absolute; top: 80px; left: 120px; width: 80px; height: 3px; background: #000; }

/* ===== Divider ===== */
.slide.divider { display: none; }
.slide.divider.active { display: flex; align-items: center; padding: 0 160px; background: #000; color: #fff; }
.divider-number { font-size: 200px; font-weight: 700; line-height: 1; margin-right: 80px; color: #fff; letter-spacing: -0.03em; }
.divider-body { border-left: 2px solid #fff; padding-left: 60px; }
.divider-label { font-size: 16px; letter-spacing: 0.25em; color: #999; margin-bottom: 18px; }
.divider-title { font-size: 64px; font-weight: 700; line-height: 1.3; }
.divider-sub { font-size: 20px; font-weight: 400; color: #CCC; line-height: 1.6; margin-top: 24px; max-width: 780px; }

/* ===== Content: 4-layer header ===== */
.section-label { font-size: 13px; letter-spacing: 0.28em; color: #888; margin-bottom: 10px; text-transform: uppercase; font-weight: 500; display: block; }
.slide-title { font-size: 34px; font-weight: 700; line-height: 1.35; margin-bottom: 10px; padding-top: 16px; position: relative; }
.slide-title::before { content: ''; position: absolute; top: 0; left: 0; width: 56px; height: 2.5px; background: #000; }
.slide-subtitle { font-size: 20px; font-weight: 400; color: #444; margin-bottom: 18px; line-height: 1.5; }
.message-line { position: relative; padding: 14px 22px; margin-bottom: 24px; font-size: 20px; font-weight: 600; line-height: 1.5; background: #F9F9F9; }
.message-line::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #000; }

/* ===== Body layouts ===== */

/* bullets */
.body-bullets { font-size: 23px; line-height: 1.75; }
.body-bullets li { list-style: none; padding-left: 28px; margin-bottom: 16px; position: relative; }
.body-bullets li::before { content: '—'; position: absolute; left: 0; color: #000; font-weight: 700; }
.body-bullets li strong { font-weight: 700; }

/* 2 column */
.body-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.col-title { font-size: 16px; letter-spacing: 0.15em; color: #666; margin-bottom: 12px; }
.col-heading { font-size: 26px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #000; }

/* table */
.body-table { width: 100%; border-collapse: collapse; }
.body-table th { background: #000; color: #fff; font-weight: 600; padding: 16px 18px; text-align: left; font-size: 19px; letter-spacing: 0.05em; }
.body-table td { border-bottom: 1px solid #DDD; padding: 16px 18px; font-size: 20px; line-height: 1.55; vertical-align: top; }
.body-table td:first-child { font-weight: 600; background: #FAFAFA; width: 220px; }
.body-table td strong { font-weight: 700; }

/* 2x2 matrix */
.body-matrix { display: grid; grid-template-columns: 64px 1fr 1fr; grid-template-rows: 44px 1fr 1fr; height: 380px; gap: 0; }
.matrix-header { display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; color: #000; background: #F5F5F5; border: 1px solid #CCC; letter-spacing: 0.05em; }
.matrix-axis { writing-mode: vertical-rl; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: #666; letter-spacing: 0.05em; padding: 20px 0; background: #FAFAFA; border: 1px solid #CCC; }
.matrix-cell { border: 1px solid #CCC; padding: 24px; font-size: 20px; line-height: 1.55; display: flex; flex-direction: column; justify-content: center; }
.matrix-cell.highlight { background: #000; color: #fff; }
.matrix-cell strong { display: block; font-size: 25px; font-weight: 700; margin-bottom: 10px; }

/* flow */
.body-flow { display: flex; align-items: stretch; gap: 16px; height: 310px; }
.flow-step { flex: 1; border: 1.5px solid #000; padding: 24px 20px; display: flex; flex-direction: column; }
.flow-phase { font-size: 14px; letter-spacing: 0.2em; color: #666; margin-bottom: 12px; }
.flow-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
.flow-desc { font-size: 17px; color: #444; line-height: 1.6; }
.flow-arrow { display: flex; align-items: center; font-size: 28px; color: #000; font-weight: 300; }

/* key number */
.body-key { display: flex; align-items: center; justify-content: center; flex-direction: column; height: 340px; text-align: center; }
.key-number { font-size: 180px; font-weight: 700; line-height: 1; margin-bottom: 24px; letter-spacing: -0.04em; }
.key-unit { font-size: 44px; font-weight: 600; margin-left: 10px; color: #333; }
.key-caption { font-size: 24px; color: #444; line-height: 1.65; max-width: 900px; }

/* timeline */
.body-timeline { display: flex; position: relative; padding-top: 20px; }
.body-timeline::before { content: ''; position: absolute; top: 54px; left: 40px; right: 40px; height: 1px; background: #000; }
.tl-point { flex: 1; text-align: center; position: relative; }
.tl-point::before { content: ''; display: block; width: 14px; height: 14px; background: #fff; border: 2px solid #000; border-radius: 50%; margin: 28px auto 18px; position: relative; z-index: 1; }
.tl-point.current::before { background: #000; }
.tl-date { font-size: 14px; letter-spacing: 0.1em; color: #666; margin-bottom: 8px; }
.tl-label { font-size: 20px; font-weight: 600; line-height: 1.4; }
.tl-note { font-size: 15px; color: #666; margin-top: 6px; line-height: 1.55; }

/* ===== Closing ===== */
.slide.closing { display: none; }
.slide.closing.active { display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px; }
.closing-message { font-size: 52px; font-weight: 700; line-height: 1.5; max-width: 1200px; letter-spacing: -0.01em; }
.closing-sub { font-size: 22px; font-weight: 400; color: #444; margin-top: 32px; line-height: 1.7; }

/* ===== Footer ===== */
.footer { position: absolute; bottom: 24px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #999; letter-spacing: 0.08em; border-top: 1px solid #E5E5E5; padding-top: 12px; }

/* ===== Navbar ===== */
.navbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px; font-size: 11px; letter-spacing: 0.08em; display: flex; gap: 16px; align-items: center; z-index: 100; }
.navbar button { background: none; border: none; color: #fff; cursor: pointer; font-size: 13px; padding: 2px 6px; }
.navbar button:hover { background: rgba(255,255,255,0.15); }
.navbar span { min-width: 80px; text-align: center; }
</style>
</head>
<body>
<div class="presentation">
  <!-- ==== INSERT_SLIDES_HERE ==== -->
  <!-- 
  Slide types reference (詳細は dp-simple-bw.html 参照):

  [Cover] 1枚目必須
  <section class="slide cover active">
    <div class="cover-line"></div>
    <div class="cover-subject">DISCUSSION PAPER</div>
    <h1 class="cover-title">タイトル</h1>
    <p class="cover-subtitle">サブタイトル</p>
    <div class="cover-meta">宛先 ｜ YYYY.MM.DD</div>
  </section>

  [Divider] セクション扉
  <section class="slide divider">
    <div class="divider-number">01</div>
    <div class="divider-body">
      <div class="divider-label">SECTION 1</div>
      <h2 class="divider-title">セクションタイトル</h2>
      <p class="divider-sub">予告文</p>
    </div>
  </section>

  [Content] 本文（4層ヘッダー + body layout 1種）
  <section class="slide">
    <div class="section-label">N. セクション名</div>
    <h2 class="slide-title">タイトル（アサーション型「〜する」）</h2>
    <p class="slide-subtitle">サブタイトル</p>
    <div class="message-line">So What メッセージライン</div>
    <!-- Body: 以下7種から1つ選択 -->
    <!-- .body-bullets / .body-2col / .body-table / .body-matrix / .body-flow / .body-key / .body-timeline -->
    <div class="footer"><span>Confidential</span><span>P.N</span></div>
  </section>

  [Closing] 締め
  <section class="slide closing">
    <div>
      <div class="closing-message">締めメッセージ</div>
      <div class="closing-sub">補足</div>
    </div>
  </section>
  -->

  <!-- デフォルト Cover（差し替えて使う） -->
  <section class="slide cover active">
    <div class="cover-line"></div>
    <div class="cover-subject">DISCUSSION PAPER</div>
    <h1 class="cover-title">タイトルを入力</h1>
    <p class="cover-subtitle">サブタイトルを入力</p>
    <div class="cover-meta">宛先 ｜ YYYY.MM.DD</div>
  </section>

</div>

<div class="navbar">
  <button id="prev">←</button>
  <span id="counter">1 / 10</span>
  <button id="next">→</button>
</div>

<script>
(function(){
  const BASE_W = 1440, BASE_H = 810;
  const pres = document.querySelector('.presentation');
  pres.style.width = BASE_W + 'px';
  pres.style.height = BASE_H + 'px';
  pres.style.position = 'absolute';
  pres.style.top = '50%';
  pres.style.left = '50%';
  const fit = () => {
    const s = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
    pres.style.transform = `translate(-50%, -50%) scale(${s})`;
  };
  addEventListener('load', fit);
  addEventListener('resize', fit);
  fit();
})();

const slides = document.querySelectorAll('.slide');
const counter = document.getElementById('counter');
let current = 0;
function goTo(i) {
  current = Math.max(0, Math.min(slides.length - 1, i));
  slides.forEach((s, idx) => s.classList.toggle('active', idx === current));
  counter.textContent = `${current + 1} / ${slides.length}`;
}
document.getElementById('prev').addEventListener('click', (e) => { e.stopPropagation(); goTo(current - 1); });
document.getElementById('next').addEventListener('click', (e) => { e.stopPropagation(); goTo(current + 1); });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goTo(current + 1); e.preventDefault(); }
  if (e.key === 'ArrowLeft') goTo(current - 1);
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(slides.length - 1);
});
document.querySelector('.presentation').addEventListener('click', e => {
  if (e.target.closest('.navbar')) return;
  const half = window.innerWidth / 2;
  goTo(e.clientX > half ? current + 1 : current - 1);
});
</script>
</body>
</html>
